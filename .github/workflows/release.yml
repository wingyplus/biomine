name: Build precompiled NIFs

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - { target: aarch64-apple-darwin         , os: macos-26                         }
          - { target: aarch64-unknown-linux-gnu    , os: ubuntu-26.04   , use-cross: true }
          - { target: aarch64-unknown-linux-musl   , os: ubuntu-26.04   , use-cross: true }
          - { target: x86_64-apple-darwin          , os: macos-26-intel                   }
          - { target: x86_64-unknown-linux-gnu     , os: ubuntu-26.04                     }
          - { target: x86_64-unknown-linux-musl    , os: ubuntu-26.04   , use-cross: true }
          - { target: x86_64-pc-windows-gnu        , os: windows-2025                     }
          - { target: x86_64-pc-windows-msvc       , os: windows-2025                     }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Set Cargo target directory
        shell: bash
        run: |
          # native/biomine_native is a member of the workspace rooted at the
          # repo root, so a plain `cargo build` there places artifacts under
          # <repo root>/target/. rustler-precompiled-action always looks for
          # them under <project-dir>/target/, so force cargo to build there.
          echo "CARGO_TARGET_DIR=target" >> $GITHUB_ENV

      - name: Build the NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: biomine_native
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/biomine_native"

      - name: Artifact upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
        if: startsWith(github.ref, 'refs/tags/')
